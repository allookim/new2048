name: flutter_2048
description: A 2048 game built with Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  uuid: ^4.4.0
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/tiles/
    - assets/images/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 100
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 200
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 300
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 400
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 500
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 600
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 700
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 800
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 900
        - asset: assets/fonts/Nunito-Italic-VariableFont_wght.ttf
          style: italic
          weight: 100
        - asset: assets/fonts/Nunito-Italic-VariableFont_wght.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/Nunito-Italic-VariableFont_wght.ttf
          style: italic
          weight: 700
        - asset: assets/fonts/Nunito-Italic-VariableFont_wght.ttf
          style: italic
          weight: 900
