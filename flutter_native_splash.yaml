flutter_native_splash:
  # 배경색
  color: "#F2EBD8"

  # 로고 이미지 경로 (실제 로고로 교체 시 이 파일만 교체하면 됨)
  image: assets/images/splash_logo.png

  # 다크모드도 동일하게
  color_dark: "#F2EBD8"
  image_dark: assets/images/splash_logo.png

  # Android 12+ 전용 설정 (squircle 컨테이너에 표시됨)
  android_12:
    color: "#F2EBD8"
    image: assets/images/splash_logo_android12.png
    color_dark: "#F2EBD8"
    image_dark: assets/images/splash_logo_android12.png

  # 웹 지원 시
  web: false
